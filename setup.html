<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI短剧宇宙 - 初始化</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:32px 24px;max-width:360px;width:90%;text-align:center}
h1{font-size:18px;margin-bottom:8px}
p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:0;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-bottom:10px;text-decoration:none;text-align:center}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#7c3aed);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:#222;color:#888;border:1px solid #333}
.btn-secondary:hover{background:#333;color:#fff}
.loading{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.success{color:#22c55e;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<div class="card" id="app">
  <div style="font-size:40px;margin-bottom:12px">🎬</div>
  <h1>AI短剧宇宙</h1>
  <p id="status">正在配置 API Key...</p>
  <div class="loading" id="loader"></div>
  <div class="success hidden" id="successMsg">✅ 配置完成！正在跳转...</div>
  <a href="https://ai-drama-portal-1430422142.cos.ap-guangzhou.myqcloud.com/creator/video/index.html" class="btn btn-primary hidden" id="goBtn">进入视频生成 →</a>
</div>
<script>
(function() {
  const KEY = "sk-d3c9413448264585a3646be881d78f1c";
  const STATUS = document.getElementById("status");
  const LOADER = document.getElementById("loader");
  const SUCCESS = document.getElementById("successMsg");
  const GO_BTN = document.getElementById("goBtn");

  try {
    const existing = localStorage.getItem("wanxiang_api_config");
    if (existing) {
      const cfg = JSON.parse(existing);
      if (cfg.apiKey && cfg.apiKey.startsWith("sk-")) {
        // Already configured
        STATUS.textContent = "API Key 已配置 ✓";
        LOADER.classList.add("hidden");
        SUCCESS.classList.remove("hidden");
        GO_BTN.classList.remove("hidden");
        setTimeout(function() {
          window.location.href = "https://ai-drama-portal-1430422142.cos.ap-guangzhou.myqcloud.com/creator/video/index.html";
        }, 1500);
        return;
      }
    }

    // Save the key
    localStorage.setItem("wanxiang_api_config", JSON.stringify({ apiKey: KEY }));
    
    // Verify
    const saved = localStorage.getItem("wanxiang_api_config");
    if (saved) {
      STATUS.textContent = "✅ API Key 配置成功！";
      LOADER.classList.add("hidden");
      SUCCESS.classList.remove("hidden");
      GO_BTN.classList.remove("hidden");
      setTimeout(function() {
        window.location.href = "https://ai-drama-portal-1430422142.cos.ap-guangzhou.myqcloud.com/creator/video/index.html";
      }, 1500);
    } else {
      throw new Error("保存失败");
    }
  } catch(e) {
    STATUS.textContent = "⚠️ 配置失败，请重试";
    LOADER.classList.add("hidden");
    GO_BTN.classList.remove("hidden");
    GO_BTN.textContent = "点击手动进入";
    console.error(e);
  }
})();
</script>
</body>
</html>
