<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI短剧宇宙 - 视频生成</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #222;font-size:14px}
.header .back{color:#888;text-decoration:none;font-size:13px}
.header h1{font-weight:600;font-size:14px}
.content{padding:16px;max-width:480px;margin:0 auto}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:12px;margin-bottom:12px;font-size:12px;line-height:1.6;color:#888}
.highlight{color:#eab308}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1px solid #333;background:transparent;color:#888;font-size:11px;cursor:pointer;transition:.2s}
.btn.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#60a5fa}
.btn.primary{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#7c3aed);border:0;color:#fff;font-size:14px;font-weight:600;margin-top:12px}
.btn.primary:disabled{opacity:.4}
.btn.small{padding:4px 10px;font-size:10px}
.hidden{display:none}
textarea,input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-size:14px;outline:none;margin-bottom:12px}
textarea{resize:none;min-height:80px}
label{display:block;font-size:12px;color:#888;margin-bottom:6px}
.progress-card{background:#111;border:1px solid #222;border-radius:12px;padding:12px;margin-bottom:12px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-card{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px;font-size:12px;color:#ef4444;margin-bottom:12px}
.success-card{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:10px;font-size:12px;color:#22c55e;margin-bottom:12px;text-align:center}
.event-card{background:#111;border:1px solid #222;border-radius:10px;padding:10px;margin-bottom:8px;font-size:12px}
.event-card .num{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:4px;background:rgba(59,130,246,.2);color:#60a5fa;font-size:10px;margin-right:6px}
.shot-card{background:#111;border:1px solid #333;border-radius:10px;padding:10px;margin-bottom:8px}
.video-link{color:#60a5fa;font-size:10px;text-decoration:none;background:rgba(59,130,246,.1);padding:2px 8px;border-radius:4px;display:inline-block;margin:2px}
.work-card{background:#111;border:1px solid #333;border-radius:10px;padding:10px;margin-bottom:8px}
</style>
</head>
<body>
<div class="header"><a href="/" class="back">&larr; 返回</a><h1>&#x1f3ac; 视频生成</h1><div style="width:40px"></div></div>
<div class="content">
<div class="card"><p style="color:#ccc;font-weight:500">&#x1f3ac; 创作流程</p><ol style="padding-left:18px;margin:8px 0">
<li>输入剧本 &rarr; AI 解析剧情结构</li><li>自动绑定角色库图片</li><li>生成分镜 + lock prompt</li><li>逐段生成视频片段</li><li>审核质量 &rarr; 输出成片</li></ol>
<p class="highlight" id="hint">&#x1f4a1; 建议先创建角色，视频会自动匹配角色图</p></div>
<label>输入剧本 <span style="color:#555">（自然语言）</span></label>
<textarea id="scriptInput" placeholder="例如：煤球在酒吧喝咖啡突然遇到爆炸，被一道蓝光卷入时空裂缝..."></textarea>
<p style="font-size:10px;color:#555;margin-bottom:6px">试试示例：</p>
<div class="btn-group">
<button class="btn" onclick="fill(0)">示例 1</button>
<button class="btn" onclick="fill(1)">示例 2</button>
<button class="btn" onclick="fill(2)">示例 3</button>
</div>
<label>视频风格</label>
<div class="btn-group" id="genres">
<button class="btn active" data-g="auto" onclick="pick(this,'auto')">&#x1f3af; 自动</button>
<button class="btn" data-g="古装" onclick="pick(this,'古装')">&#x1f3ef; 古装</button>
<button class="btn" data-g="现代" onclick="pick(this,'现代')">&#x1f3d9; 现代</button>
<button class="btn" data-g="科幻" onclick="pick(this,'科幻')">&#x1f680; 科幻</button>
</div>
<button class="btn primary" id="genBtn" onclick="generate()" disabled>&#x1f3ac; 生成视频</button>
<div id="loadingArea" class="hidden"><div class="progress-card"><span class="spinner"></span> <span id="progText" style="font-size:13px;color:#ccc;margin-left:8px">处理中...</span></div></div>
<div id="errorArea" class="hidden error-card"></div>
<div id="resultArea" class="hidden"></div>
<div id="worksArea" class="hidden"></div>
</div>
<script>
var GENRE="auto",SCRIPT="",EXAMPLES=["煤球在酒吧喝咖啡突然遇到爆炸，被一道蓝光卷入时空裂缝，醒来发现被古代士兵包围","小美第一天到新公司上班，发现自己工位旁边的同事是高中暗恋的学长","老张在深山里发现一座废弃的道观，推门进去后看到一个白衣女子在练剑"];
function fill(i){var t=document.getElementById("scriptInput");t.value=EXAMPLES[i];SCRIPT=EXAMPLES[i];update()}
function pick(el,g){document.querySelectorAll("#genres .btn").forEach(function(b){b.classList.remove("active")});el.classList.add("active");GENRE=g}
function update(){var b=document.getElementById("genBtn"),t=document.getElementById("scriptInput");b.disabled=!t.value.trim()}
document.addEventListener("DOMContentLoaded",function(){var t=document.getElementById("scriptInput");t.addEventListener("input",function(){SCRIPT=t.value;update()});checkConfig()})
function checkConfig(){var h=document.getElementById("hint");try{var r=localStorage.getItem("wanxiang_api_config");if(!r){h.textContent="\u26a0\ufe0f 未配置通义万相 API Key，请先到 AI 设置中配置";return}var c=JSON.parse(r);if(!c.apiKey||!c.apiKey.startsWith("sk-")){h.textContent="\u26a0\ufe0f API Key 格式异常"}else{h.innerHTML="\u2705 已配置 API Key";h.style.color="#22c55e"}}catch(e){}}
function show(id){document.getElementById(id).classList.remove("hidden")}
function hide(id){document.getElementById(id).classList.add("hidden")}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function err(msg){document.getElementById("errorArea").textContent=msg;show("errorArea")}
function parseLocal(text){var s=text.split(/[。！？\n]+/).filter(function(x){return x.trim().length>3}),ev=[];for(var i=0;i<Math.min(s.length,6);i++){var m=s[i].match(/(.{1,4})(?:在|遇到|发现|走进|来到|被|看着|对|和|说)/);ev.push({idx:i,scene:s[i].slice(0,20),chars:m?[m[1]]:[],action:s[i].slice(20,40),start:i*3,end:(i+1)*3})}return ev}
function getAllChars(){return new Promise(function(r){var t=setTimeout(function(){r([])},5000);try{var q=indexedDB.open("ai_drama_db",1);q.onsuccess=function(){var d=q.result;if(!d.objectStoreNames.contains("characters")){clearTimeout(t);r([]);d.close();return}var x=d.transaction("characters","readonly").objectStore("characters").getAll();x.onsuccess=function(){clearTimeout(t);r(x.result||[])};x.onerror=function(){clearTimeout(t);r([])};d.close()};q.onerror=function(){clearTimeout(t);r([])};q.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains("characters"))d.createObjectStore("characters",{keyPath:"id"});clearTimeout(t);r([])}}catch(e){clearTimeout(t);r([])}})}
// Proxy calls
function submitTask(prompt,imgUrl,dur){return fetch("/api/wanxiang/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:JSON.parse(localStorage.getItem("wanxiang_api_config")).apiKey,prompt:prompt,duration:dur,imageUrl:imgUrl||""})}).then(function(r){if(!r.ok)return r.text().then(function(t){throw Error("API "+r.status+": "+t.slice(0,80))});return r.json()}).then(function(d){if(!d.output||!d.output.task_id)throw Error("No task_id");return d.output.task_id})}
function pollTask(id){var k=JSON.parse(localStorage.getItem("wanxiang_api_config")).apiKey;return new Promise(function(r,x){var c=0;var i=setInterval(function(){c++;if(c>30){clearInterval(i);x(Error("超时"))}fetch("/api/wanxiang/query",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:k,taskId:id})}).then(function(res){return res.json()}).then(function(d){var s=d.output&&d.output.task_status;if(s==="SUCCEEDED"){clearInterval(i);r(d.output.video_url||"")}if(s==="FAILED"){clearInterval(i);x(Error(d.output.failure_reason||"生成失败"))}}).catch(function(){})},10000)})}
// Works management
function saveWork(t,shots,urls,g){try{var w={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),title:t.slice(0,30)+(t.length>30?"...":""),genre:g||"auto",script:t,shots:shots.map(function(s,i){return{scene:s.scene,duration:s.duration,url:urls[i]||""}}),urls:urls.filter(function(u){return u.length>0}),createdAt:Date.now()};var ws=getWorks();ws.unshift(w);localStorage.setItem("ai_drama_video_works",JSON.stringify(ws));return w}catch(e){return null}}
function getWorks(){try{var r=localStorage.getItem("ai_drama_video_works");return r?JSON.parse(r):[]}catch(e){return[]}}
function delWork(id){var ws=getWorks().filter(function(w){return w.id!==id});localStorage.setItem("ai_drama_video_works",JSON.stringify(ws));renderWorks()}

function addVideoPlayer(url, container) {
  if (!url || url.length < 10) return;
  var div = document.createElement("div");
  div.style.cssText = "margin-top:6px;border-radius:8px;overflow:hidden;background:#000";
  div.innerHTML = '<video controls playsinline autoplay muted style="width:100%;display:block;border-radius:8px;max-height:300px"><source src="'+url+'" type="video/mp4"></video>';
  container.appendChild(div);
}
window.addVideoPlayer = addVideoPlayer;

function renderWorks(){var ws=getWorks(),h=document.getElementById("worksArea");if(ws.length===0){h.innerHTML='<p style="text-align:center;color:#555;padding:10px;font-size:12px">还没有作品</p>';h.style.display="block";return}var html='<h3 style="font-size:12px;color:#888;margin:12px 0 8px">\ud83d\udcc2 我的作品 ('+ws.length+')</h3>';ws.forEach(function(w){html+='<div class="work-card"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#ccc">'+w.title+'</span><button onclick="delWork(\''+w.id+'\')" style="background:none;border:1px solid #333;color:#ef4444;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer">删除</button></div><div style="font-size:10px;color:#555;margin-top:4px">'+new Date(w.createdAt).toLocaleString("zh-CN")+'</div>';w.urls.forEach(function(u,i){html+='<div style="margin:4px 0"><video controls playsinline style="width:100%;border-radius:8px;max-height:250px" preload="metadata"><source src="'+u+'" type="video/mp4"></video></div>'});html+='</div>'});h.innerHTML=html;h.style.display="block"}
function confirmDel(id){if(confirm("确定删除？"))delWork(id)}
async function generate(){var ta=document.getElementById("scriptInput"),script=ta.value.trim();if(!script)return;hide("errorArea");hide("resultArea");show("loadingArea");document.getElementById("progText").textContent="\u{1f3af} 解析剧本...";await sleep(300);var ev=parseLocal(script);document.getElementById("progText").textContent="\u{1f50d} 绑定角色...";await sleep(200);var ac=[],ls;try{ac=await getAllChars()}catch(e){ac=[]}if(!ac||ac.length===0){try{ls=JSON.parse(localStorage.getItem("ai_drama_characters"));if(ls&&ls.length>0)ac=ls}catch(e){}}var bc=[],mc=[],seen={};ev.forEach(function(e){e.chars.forEach(function(c){if(seen[c])return;seen[c]=true;var f=ac.find(function(x){return x.name===c||x.name.includes(c)||c.includes(x.name)||(x.id&&(x.id===c||x.id.includes(c)||c.includes(x.id)))});if(f)bc.push({name:c,img:f.imageUrl||"",matched:true});else mc.push(c)})});if(mc.length>0){hide("loadingArea");err("\u26a0\ufe0f 未找到角色: "+mc.join("、")+"。角色库现有: "+(ac.length?ac.map(function(x){return x.name}).join("、"):"（空）"));return}document.getElementById("progText").textContent="\u{1f3ac} 生成分镜...";await sleep(200);var atm={"古装":"古风暖黄","现代":"都市自然","科幻":"赛博霓虹"},g=GENRE==="auto"?"现代":GENRE;var shots=ev.map(function(e){var sc=bc.filter(function(c){return e.chars.includes(c.name)});return{idx:e.idx,scene:e.scene,chars:sc,action:e.action,dur:e.end-e.start||3,prompt:(sc.map(function(c){return c.name}).join("和")||"场景")+"在"+e.scene+"中"+e.action+"。"+(atm[g]||"自然写实")+"。"}});var evHtml="<h3 style='font-size:12px;color:#888;margin:8px 0'>\u{1f4d1} 解析结果</h3>";ev.forEach(function(e,i){evHtml+="<div class='event-card'><span class='num'>"+(i+1)+"</span><span style='font-size:12px;color:#ccc'>"+e.scene+"</span><div style='margin-top:4px'>角色: "+e.chars.map(function(c){return'<span style="background:rgba(34,197,94,.2);color:#22c55e;border-radius:8px;padding:0 6px;font-size:10px">'+c+" \u2705</span>"}).join(" ")+"</div></div>"});document.getElementById("resultArea").innerHTML=evHtml;show("resultArea");document.getElementById("progText").textContent="\u{1f4fa} 生成视频中...";await sleep(500);var suc=0,fail=0,urls=[];for(var i=0;i<shots.length;i++){document.getElementById("progText").textContent="\u{1f4fa} 生成镜头 "+(i+1)+"/"+shots.length+(fail?"（失败"+fail+"）":"");try{var tid=await submitTask(shots[i].prompt,(shots[i].chars[0]?shots[i].chars[0].img:""),shots[i].dur);var vu=await pollTask(tid);if(vu){suc++;urls.push(vu)}else throw Error("空结果")}catch(e){fail++;urls.push("");console.error("镜头"+(i+1)+"失败:",e.message)}}hide("loadingArea");if(suc>0){var sh=saveWork(script,shots,urls,g);if(sh)document.getElementById("resultArea").innerHTML+='<div class="success-card">\u2705 已保存到「我的作品」</div>';urls.forEach(function(u,i){if(u&&u.length>10){document.getElementById("resultArea").innerHTML+='<div class="shot-card"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="background:rgba(59,130,246,.2);color:#60a5fa;border-radius:4px;padding:0 6px;font-size:10px">'+(i+1)+'</span><span style="font-size:12px;color:#ccc">镜头 '+(i+1)+'</span></div><video controls playsinline style="width:100%;border-radius:8px;max-height:300px" preload="metadata"><source src="'+u+'" type="video/mp4"></video></div>'}})}if(fail>0)err("\u26a0\ufe0f "+fail+"个镜头失败（"+suc+"/"+shots.length+"成功）");renderWorks()}
</script>
</body>
</html>
